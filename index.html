<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>跨境 DemoTMS · 产品设计：孙明泰</title>
<style>
/* ─── CSS 变量 ─── */
:root {
  --bg-base: #f9fafb;
  --bg-surface: #ffffff;
  --bg-card: #ffffff;
  --bg-hover: #f3f4f6;
  --border: #e5e7eb;
  --border-bright: #d1d5db;
  --accent: #6366f1;
  --accent-light: #4f46e5;
  --accent-glow: rgba(99,102,241,0.12);
  --teal: #0891b2;
  --amber: #d97706;
  --red: #dc2626;
  --green: #16a34a;
  --purple: #7c3aed;
  --text-primary: #111827;
  --text-secondary: #4b5563;
  --text-muted: #9ca3af;
  --font-sans: 'Inter', 'DM Sans', 'PingFang SC', 'Helvetica Neue', sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  --radius: 8px;
  --radius-lg: 10px;
  --sidebar-w: 216px;
  --header-h: 52px;
  --transition: 0.15s cubic-bezier(0.4,0,0.2,1);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{background:var(--bg-base);color:var(--text-primary);font-family:var(--font-sans);min-height:100vh;overflow-x:hidden}
a{text-decoration:none;color:inherit}
button{cursor:pointer;border:none;background:none;font-family:inherit;font-size:inherit}
input,select,textarea{font-family:inherit;font-size:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:#9ca3af}

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

/* ─── 布局 ─── */
#app{display:flex;height:100vh;overflow:hidden}
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:#fff;
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{
  height:var(--header-h);min-height:var(--header-h);
  background:#fff;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:12px;
  position:relative;z-index:10;
}
.page-content{flex:1;overflow-y:auto;padding:20px;position:relative;background:var(--bg-base)}

/* ─── Sidebar 品牌 ─── */
.brand{
  padding:0 16px;height:var(--header-h);min-height:var(--header-h);
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border);
}
.brand-logo{
  width:28px;height:28px;border-radius:7px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;letter-spacing:-0.5px;
  flex-shrink:0;
}
.brand-name{font-size:13px;font-weight:600;color:var(--text-primary)}
.brand-sub{font-size:10px;color:var(--text-muted);margin-top:1px}

/* ─── Nav ─── */
.nav-section{
  padding:16px 12px 4px;
  font-size:10px;color:var(--text-muted);
  letter-spacing:0.8px;text-transform:uppercase;font-weight:600;
}
.nav-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 10px;margin:1px 8px;
  border-radius:var(--radius);cursor:pointer;
  color:var(--text-secondary);font-size:13px;font-weight:400;
  transition:all var(--transition);position:relative;
}
.nav-item:hover{background:var(--bg-hover);color:var(--text-primary)}
.nav-item.active{
  background:#eef2ff;
  color:#4338ca;
  font-weight:500;
}
.nav-item.active::before{
  content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);
  width:3px;height:16px;background:#6366f1;border-radius:0 2px 2px 0;
}
.nav-icon{width:15px;height:15px;flex-shrink:0;opacity:0.7}
.nav-item.active .nav-icon{opacity:1}
.nav-badge{
  margin-left:auto;background:var(--red);color:#fff;
  font-size:10px;font-weight:600;padding:1px 5px;border-radius:8px;min-width:16px;text-align:center;
}
.nav-badge.amber{background:var(--amber)}
.nav-badge.blue{background:var(--accent)}

/* ─── Sidebar 底部 ─── */
.sidebar-footer{
  margin-top:auto;padding:12px 16px;
  border-top:1px solid var(--border);
}
.user-card{display:flex;align-items:center;gap:9px}
.user-avatar{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;color:#fff;flex-shrink:0;
}
.user-name{font-size:12px;font-weight:500;color:var(--text-primary)}
.user-role{font-size:10px;color:var(--text-muted)}

/* ─── Topbar ─── */
.topbar-path{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted)}
.topbar-path span{color:var(--text-secondary)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.topbar-tag{
  padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;
  background:#eef2ff;border:1px solid #c7d2fe;color:#4338ca;
}

/* ─── 通用卡片 ─── */
.card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:16px;
}
.section-title{
  font-size:13px;font-weight:600;color:var(--text-primary);
  margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.section-title .dot{
  width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;
}

/* ─── 状态标签 ─── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-blue{background:#eef2ff;color:#4338ca;border:1px solid #c7d2fe}
.badge-green{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
.badge-amber{background:#fffbeb;color:#b45309;border:1px solid #fde68a}
.badge-red{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
.badge-teal{background:#ecfeff;color:#0e7490;border:1px solid #a5f3fc}
.badge-purple{background:#f5f3ff;color:#6d28d9;border:1px solid #ddd6fe}
.badge-gray{background:#f9fafb;color:#6b7280;border:1px solid #e5e7eb}
.badge-dot{width:5px;height:5px;border-radius:50%}
.badge-blue .badge-dot{background:#6366f1}
.badge-green .badge-dot{background:#22c55e}
.badge-amber .badge-dot{background:#f59e0b}
.badge-red .badge-dot{background:#ef4444}
.badge-teal .badge-dot{background:#06b6d4}

/* ─── 按钮 ─── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:var(--radius);
  font-size:12px;font-weight:500;cursor:pointer;
  transition:all var(--transition);white-space:nowrap;
}
.btn-primary{background:#6366f1;color:#fff;border:1px solid transparent}
.btn-primary:hover{background:#4f46e5;box-shadow:0 1px 4px rgba(99,102,241,0.3)}
.btn-secondary{background:#fff;color:var(--text-secondary);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg-hover);border-color:var(--border-bright);color:var(--text-primary)}
.btn-ghost{background:transparent;color:var(--text-secondary);border:1px solid transparent}
.btn-ghost:hover{background:var(--bg-hover);color:var(--text-primary)}
.btn-success{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
.btn-success:hover{background:#dcfce7}
.btn-danger{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
.btn-danger:hover{background:#fee2e2}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-icon{padding:6px;border-radius:var(--radius)}

/* ─── 表格 ─── */
.data-table{width:100%;border-collapse:collapse}
.data-table th{
  text-align:left;padding:8px 12px;
  font-size:11px;font-weight:600;color:var(--text-muted);
  letter-spacing:0.4px;text-transform:uppercase;
  border-bottom:1px solid var(--border);white-space:nowrap;
  background:#f9fafb;
}
.data-table td{
  padding:10px 12px;border-bottom:1px solid #f3f4f6;
  font-size:12px;color:var(--text-secondary);vertical-align:middle;
}
.data-table tr:hover td{background:#fafafa;color:var(--text-primary)}
.data-table tr:last-child td{border-bottom:none}

/* ─── 输入框 ─── */
.input{
  background:#fff;border:1px solid var(--border);
  border-radius:var(--radius);padding:7px 11px;
  color:var(--text-primary);font-size:12px;outline:none;
  transition:border-color var(--transition),box-shadow var(--transition);
}
.input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
.input::placeholder{color:var(--text-muted)}

/* ─── 步骤条 ─── */
.step-line{display:flex;align-items:center;gap:0}
.step-node{
  display:flex;align-items:center;justify-content:center;
  width:24px;height:24px;border-radius:50%;border:2px solid var(--border);
  font-size:10px;font-weight:600;color:var(--text-muted);
  background:#fff;flex-shrink:0;position:relative;z-index:1;
}
.step-node.done{background:#16a34a;border-color:#16a34a;color:#fff}
.step-node.active{background:#6366f1;border-color:#6366f1;color:#fff;box-shadow:0 0 0 3px rgba(99,102,241,0.15)}
.step-node.error{background:#dc2626;border-color:#dc2626;color:#fff}
.step-connector{flex:1;height:2px;background:#e5e7eb;margin:0 2px}
.step-connector.done{background:#16a34a}

/* ─── Tab ─── */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab-btn{
  padding:8px 16px;font-size:12px;font-weight:500;color:var(--text-muted);
  cursor:pointer;transition:all var(--transition);
  border-bottom:2px solid transparent;margin-bottom:-1px;
}
.tab-btn:hover{color:var(--text-secondary)}
.tab-btn.active{color:#4338ca;border-bottom-color:#6366f1;font-weight:600}

/* ─── Timeline ─── */
.timeline{display:flex;flex-direction:column;gap:0}
.tl-item{display:flex;gap:12px;position:relative}
.tl-item:not(:last-child)::before{
  content:'';position:absolute;left:11px;top:22px;bottom:-8px;width:1px;
  background:#e5e7eb;
}
.tl-dot{
  width:22px;height:22px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;margin-top:1px;
}
.tl-dot.done{background:#dcfce7;color:#15803d;border:1.5px solid #86efac}
.tl-dot.active{background:#fffbeb;color:#b45309;border:1.5px solid #fde68a;animation:pulse 2s infinite}
.tl-dot.error{background:#fef2f2;color:#b91c1c;border:1.5px solid #fecaca}
.tl-dot.pending{background:#f9fafb;border:1.5px solid #e5e7eb;color:transparent}
.tl-body{flex:1;padding-bottom:14px}
.tl-title{font-size:12px;font-weight:500;color:var(--text-primary)}
.tl-meta{font-size:11px;color:var(--text-muted);margin-top:2px}
.tl-time{font-size:10px;color:var(--text-muted);font-family:var(--font-mono)}

/* ─── 分隔线 ─── */
.divider{height:1px;background:var(--border);margin:14px 0}

/* ─── 网格 ─── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}

/* ─── 统计卡片 ─── */
.stat-card{
  background:#fff;border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:14px 16px;
}
.stat-card .stat-label{font-size:11px;color:var(--text-muted);font-weight:500}
.stat-card .stat-value{font-size:22px;font-weight:600;color:var(--text-primary);margin-top:4px;line-height:1}
.stat-card .stat-sub{font-size:11px;color:var(--text-muted);margin-top:5px}
.stat-card .stat-glow{display:none}

/* ─── 动画 ─── */
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(245,158,11,0.1)}50%{box-shadow:0 0 0 5px rgba(245,158,11,0.2)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.fade-in{animation:fadeIn 0.25s ease forwards}
.slide-in{animation:slideIn 0.2s ease forwards}

/* ─── 打字机 ─── */
.typewriter-cursor{display:inline-block;width:2px;height:12px;background:#6366f1;margin-left:2px;animation:blink 1s infinite;vertical-align:middle}

/* ─── 进度条 ─── */
.progress-bar{height:5px;border-radius:3px;background:#f3f4f6;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width 0.5s ease}
.progress-fill.blue{background:#6366f1}
.progress-fill.green{background:#22c55e}
.progress-fill.amber{background:#f59e0b}
.progress-fill.red{background:#ef4444}

/* ─── 告警条 ─── */
.alert{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 14px;border-radius:var(--radius);margin-bottom:10px;
  font-size:12px;
}
.alert-red{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
.alert-amber{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
.alert-blue{background:#eef2ff;border:1px solid #c7d2fe;color:#3730a3}
.alert-green{background:#f0fdf4;border:1px solid #bbf7d0;color:#14532d}

/* ─── 页面容器 ─── */
.page{display:none;animation:fadeIn 0.2s ease}
.page.active{display:block}

/* ─── AI 辅助区 ─── */
.ai-panel{
  background:#fafafa;
  border:1px solid #e0e7ff;
  border-radius:var(--radius-lg);padding:14px;position:relative;overflow:hidden;
}
.ai-panel::before{
  content:'AI';position:absolute;top:10px;right:12px;
  font-size:9px;font-weight:700;letter-spacing:1.5px;
  color:#6366f1;opacity:0.3;
}
.ai-panel-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.ai-dot{
  width:7px;height:7px;border-radius:50%;background:#6366f1;
  animation:pulse 2s infinite;flex-shrink:0;
}

/* ─── 置信度条 ─── */
.confidence-bar{display:flex;align-items:center;gap:8px}
.confidence-track{flex:1;height:3px;background:#f3f4f6;border-radius:2px;overflow:hidden}
.confidence-fill{height:100%;border-radius:2px;transition:width 1s ease 0.3s}
.confidence-high .confidence-fill{background:#16a34a}
.confidence-mid .confidence-fill{background:#d97706}
.confidence-low .confidence-fill{background:#dc2626}

/* ─── 折叠面板 ─── */
.collapsible-header{
  display:flex;align-items:center;gap:8px;cursor:pointer;
  padding:8px 12px;border-radius:var(--radius);
  transition:background var(--transition);user-select:none;
}
.collapsible-header:hover{background:var(--bg-hover)}
.collapsible-arrow{transition:transform var(--transition);margin-left:auto;color:var(--text-muted)}
.collapsible-body{overflow:hidden;transition:max-height 0.3s ease,opacity 0.3s ease;max-height:0;opacity:0}
.collapsible-body.open{max-height:600px;opacity:1}

/* ─── 模态框 ─── */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(17,24,39,0.4);
  z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(2px);
}
.modal-overlay.open{display:flex;animation:fadeIn 0.15s ease}
.modal{
  background:#fff;border:1px solid var(--border);
  border-radius:12px;padding:22px;
  min-width:380px;max-width:520px;width:90%;
  box-shadow:0 20px 50px rgba(0,0,0,0.15);
  animation:fadeIn 0.2s ease;
}
.modal-title{font-size:15px;font-weight:600;color:var(--text-primary);margin-bottom:14px}

/* ─── 检查项 ─── */
.check-icon{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:9px}
.check-icon.pass{background:#dcfce7;color:#15803d;border:1px solid #86efac}
.check-icon.fail{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
.check-icon.warn{background:#fffbeb;color:#b45309;border:1px solid #fde68a}
.check-icon.pending{background:#f9fafb;border:1.5px solid #e5e7eb}

/* ─── 字段行 ─── */
.field-row{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid #f9fafb}
.field-label{font-size:11px;color:var(--text-muted);width:110px;flex-shrink:0;padding-top:1px}
.field-value{font-size:12px;color:var(--text-secondary);flex:1}
.field-row:last-child{border-bottom:none}

/* ─── 节点卡片 ─── */
.node-card{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:var(--radius);
  background:#fff;border:1px solid var(--border);
  cursor:pointer;transition:all var(--transition);
}
.node-card:hover{border-color:var(--border-bright);background:#fafafa}
.node-card.active-node{border-color:#fde68a;background:#fffbeb}
.node-card.done-node{border-color:#bbf7d0}
.node-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;background:#f9fafb}

/* ─── 搜索框 ─── */
.search-box{
  display:flex;align-items:center;gap:7px;
  background:#fff;border:1px solid var(--border);
  border-radius:var(--radius);padding:6px 11px;
  transition:border-color var(--transition);
}
.search-box:focus-within{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
.search-box input{background:none;border:none;outline:none;color:var(--text-primary);font-size:12px;flex:1}
.search-box input::placeholder{color:var(--text-muted)}

/* ─── 工作队列标签 ─── */
.queue-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
.queue-tab{
  padding:4px 12px;border-radius:20px;font-size:11px;font-weight:500;
  cursor:pointer;border:1px solid var(--border);color:var(--text-muted);
  background:#fff;transition:all var(--transition);
}
.queue-tab:hover{border-color:var(--border-bright);color:var(--text-secondary)}
.queue-tab.active{background:#eef2ff;border-color:#c7d2fe;color:#4338ca;font-weight:600}

/* ─── 流程连接箭头 ─── */
.flow-arrow{display:flex;align-items:center;color:var(--text-muted);font-size:12px;padding:0 4px}

/* ─── scan-effect（去掉深色版扫描线，改为subtle边框高亮）─── */
.scan-effect{border:1px solid #e0e7ff !important}
</style>
</head>
<body>

<div id="app">
  <!-- 侧边栏 -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">T</div>
      <div>
        <div class="brand-name">跨境 DemoTMS</div>
        <div class="brand-sub">产品设计：孙明泰</div>
      </div>
    </div>

    <nav id="nav" style="flex:1;overflow-y:auto;padding:4px 0">
      <div class="nav-section">工作台</div>
      <div class="nav-item active" data-page="order-list" onclick="navigate(this)">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><line x1="5" y1="6" x2="11" y2="6"/><line x1="5" y1="9" x2="9" y2="9"/></svg>
        订单中心
        <span class="nav-badge">3</span>
      </div>
      <div class="nav-item" data-page="order-entry" onclick="navigate(this)">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 3v10M3 8l5-5 5 5"/></svg>
        订单接入
        <span class="nav-badge amber">1</span>
      </div>

      <div class="nav-section">履约处理</div>
      <div class="nav-item" data-page="order-detail" onclick="navigate(this)">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="5"/><line x1="8" y1="5" x2="8" y2="8"/><line x1="8" y1="8" x2="10" y2="10"/></svg>
        履约概览
      </div>
      <div class="nav-item" data-page="dispatch" onclick="navigate(this)">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 8h12M10 4l4 4-4 4"/></svg>
        调度方案
